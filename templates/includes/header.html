<header class="sticky top-0 z-50 border-b border-slate-200/80 bg-white/80 backdrop-blur-xl dark:border-slate-800 dark:bg-slate-950/80">
  <div class="max-w-7xl mx-auto px-6">
    <div class="h-20 flex items-center justify-between gap-6">

      <a href="{% url 'pages:home' %}" class="flex items-center gap-3 shrink-0">
        <div class="h-10 w-10 rounded-2xl bg-gradient-to-br from-violet-600 via-indigo-600 to-sky-500 shadow-md"></div>
        <div class="leading-tight">
          <div class="font-extrabold text-slate-900 dark:text-white">Алтын Алтай</div>
          <div class="text-xs text-slate-500 dark:text-slate-400">Музей минералов</div>
        </div>
      </a>

      <nav class="hidden lg:flex items-center gap-2">
        <a href="{% url 'pages:about' %}"
           class="px-4 py-2 rounded-xl text-sm font-medium text-slate-700 hover:text-violet-700 hover:bg-violet-50 transition dark:text-slate-200 dark:hover:text-white dark:hover:bg-slate-800">
          О музее
        </a>

        <a href="{% url 'pages:collection' %}"
           class="px-4 py-2 rounded-xl text-sm font-medium text-slate-700 hover:text-violet-700 hover:bg-violet-50 transition dark:text-slate-200 dark:hover:text-white dark:hover:bg-slate-800">
          Коллекция
        </a>

        <a href="{% url 'pages:tours' %}"
           class="px-4 py-2 rounded-xl text-sm font-medium text-slate-700 hover:text-violet-700 hover:bg-violet-50 transition dark:text-slate-200 dark:hover:text-white dark:hover:bg-slate-800">
          Экскурсии
        </a>

        <a href="{% url 'pages:map' %}"
           class="px-4 py-2 rounded-xl text-sm font-medium text-slate-700 hover:text-violet-700 hover:bg-violet-50 transition dark:text-slate-200 dark:hover:text-white dark:hover:bg-slate-800">
          Карта
        </a>

        <a href="{% url 'pages:gallery' %}"
           class="px-4 py-2 rounded-xl text-sm font-medium text-slate-700 hover:text-violet-700 hover:bg-violet-50 transition dark:text-slate-200 dark:hover:text-white dark:hover:bg-slate-800">
          Галерея
        </a>

        <a href="{% url 'recognize:upload' %}"
           class="px-4 py-2 rounded-xl text-sm font-medium text-slate-700 hover:text-violet-700 hover:bg-violet-50 transition dark:text-slate-200 dark:hover:text-white dark:hover:bg-slate-800">
          Распознать
        </a>
      </nav>

      <div class="flex items-center gap-3 shrink-0">

        <button id="theme-toggle"
                type="button"
                class="inline-flex items-center justify-center h-11 w-11 rounded-2xl border border-slate-200 bg-white text-slate-700 hover:bg-slate-50 transition shadow-sm dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800"
                aria-label="Переключить тему">
          <span id="theme-icon">🌙</span>
        </button>

        <div class="hidden md:flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-2 py-2 shadow-sm dark:border-slate-700 dark:bg-slate-900">
          <form action="/i18n/setlang/" method="post" class="flex items-center gap-2">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.path }}">

            <button name="language" value="ru"
                    class="px-3 py-1.5 rounded-xl text-xs font-semibold text-slate-600 hover:bg-slate-100 transition dark:text-slate-300 dark:hover:bg-slate-800">
              RU
            </button>

            <button name="language" value="kk"
                    class="px-3 py-1.5 rounded-xl text-xs font-semibold text-slate-600 hover:bg-slate-100 transition dark:text-slate-300 dark:hover:bg-slate-800">
              KZ
            </button>

            <button name="language" value="en"
                    class="px-3 py-1.5 rounded-xl text-xs font-semibold text-slate-600 hover:bg-slate-100 transition dark:text-slate-300 dark:hover:bg-slate-800">
              EN
            </button>
          </form>
        </div>

        {% if request.user.is_authenticated %}
          <a href="{% url 'accounts:cabinet' %}"
             class="hidden sm:inline-flex px-4 py-2.5 rounded-2xl border border-slate-200 bg-white text-sm font-semibold text-slate-700 hover:bg-slate-50 transition shadow-sm dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
            Кабинет
          </a>

          <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button class="px-4 py-2 bg-purple-600 text-white rounded-xl">
                Выйти
            </button>
          </form>

        {% else %}
          <a href="{% url 'accounts:login' %}"
             class="hidden sm:inline-flex px-4 py-2.5 rounded-2xl border border-slate-200 bg-white text-sm font-semibold text-slate-700 hover:bg-slate-50 transition shadow-sm dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800">
            Войти
          </a>

          <a href="{% url 'accounts:register' %}"
             class="inline-flex px-4 py-2.5 rounded-2xl bg-violet-600 text-white text-sm font-semibold hover:bg-violet-700 transition shadow-lg shadow-violet-200 dark:shadow-none">
            Регистрация
          </a>
        {% endif %}

      </div>
    </div>
  </div>
</header>

<script>
  (function () {
    const root = document.documentElement;
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

    if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
      root.classList.add("dark");
    } else {
      root.classList.remove("dark");
    }

    function updateIcon() {
      const icon = document.getElementById("theme-icon");
      if (!icon) return;
      icon.textContent = root.classList.contains("dark") ? "☀️" : "🌙";
    }

    document.addEventListener("DOMContentLoaded", function () {
      updateIcon();

      const button = document.getElementById("theme-toggle");
      if (!button) return;

      button.addEventListener("click", function () {
        root.classList.toggle("dark");
        const theme = root.classList.contains("dark") ? "dark" : "light";
        localStorage.setItem("theme", theme);
        updateIcon();
      });
    });
  })();
</script>
