<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>История распознаваний</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50">

{% include "includes/header.html" %}

<section class="max-w-7xl mx-auto px-6 py-12">

<h1 class="text-4xl font-extrabold mb-8">
История распознаваний
</h1>

<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

{% for rec in recognitions %}

<div class="bg-white rounded-2xl shadow p-4">

{% if rec.image %}
<img src="{{ rec.image.url }}" class="rounded-xl mb-3">
{% endif %}

<div class="font-bold text-lg">
{{ rec.top1_label }}
</div>

<div class="text-sm text-slate-500 mt-1">
Вероятность: {{ rec.top1_conf|floatformat:2 }}%
</div>

<div class="text-xs text-slate-400 mt-2">
{{ rec.created_at|date:"d.m.Y H:i" }}
</div>

</div>

{% endfor %}

</div>

</section>

</body>
</html>
