{% load socialaccount %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Алтын Алтай — музей минералов</title>

  <meta name="theme-color" content="#7c3aed">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Алтын Алтай">

  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
</head>


<body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

  {% include "includes/header.html" %}

  <section class="max-w-md mx-auto px-6 py-14">
    <div class="rounded-[2rem] border border-slate-200 bg-white shadow-sm p-8 dark:bg-slate-900 dark:border-slate-800">
      <div class="text-sm font-semibold uppercase tracking-wider text-violet-700 dark:text-violet-400">
        Авторизация
      </div>

      <h1 class="mt-3 text-3xl font-extrabold">Войти в аккаунт</h1>

      <p class="mt-3 text-slate-600 dark:text-slate-300">
        Войдите через логин и пароль или используйте Google.
      </p>

      <a href="{% provider_login_url 'google' process='login' %}"
         class="mt-6 w-full inline-flex items-center justify-center gap-3 px-5 py-3 rounded-2xl border border-slate-200 bg-white font-semibold text-slate-800 hover:bg-slate-50 dark:bg-slate-950 dark:border-slate-700 dark:text-slate-100 dark:hover:bg-slate-800">
        <span>🔵</span>
        <span>Войти через Google</span>
      </a>

      <div class="my-6 flex items-center gap-3">
        <div class="h-px flex-1 bg-slate-200 dark:bg-slate-800"></div>
        <div class="text-xs uppercase tracking-wider text-slate-400">или</div>
        <div class="h-px flex-1 bg-slate-200 dark:bg-slate-800"></div>
      </div>

      <form method="post" class="space-y-4">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium mb-2">Логин</label>
          <input type="text" name="username"
                 class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 dark:bg-slate-950 dark:border-slate-700 dark:text-slate-100">
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Пароль</label>
          <input type="password" name="password"
                 class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 dark:bg-slate-950 dark:border-slate-700 dark:text-slate-100">
        </div>

        {% if form.errors %}
          <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 dark:border-red-900 dark:bg-red-950 dark:text-red-300">
            Неверный логин или пароль.
          </div>
        {% endif %}

        <button type="submit"
                class="w-full px-5 py-3 rounded-2xl bg-violet-600 text-white font-semibold hover:bg-violet-700">
          Войти
        </button>
      </form>
    </div>
  </section>

  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("/static/sw.js")
        .then(function (registration) {
          console.log("Service Worker registered:", registration.scope);
        })
        .catch(function (error) {
          console.log("Service Worker registration failed:", error);
        });
    });
  }
  </script>

</body>
</html>
