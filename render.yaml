services:
  - type: web
    name: altyn-altai
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python -m gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DATABASE_URL
        fromDatabase:
          name: altyn-altai-db
          property: connectionString

databases:
  - name: altyn-altai-db